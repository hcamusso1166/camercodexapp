                const accepted = localStorage.getItem("cc_license_accepted") === "1";
                const acceptedVersion = localStorage.getItem("cc_license_version") || "";
                const onLicensePage = location.pathname.includes("/legal/licencia.html");

                if (!onLicensePage && (!accepted || acceptedVersion !== LICENSE_VERSION)) {
                    localStorage.setItem("cc_license_return_to", location.href);
                    location.replace("/legal/licencia.html");

        <script>
        (function () {
            const LICENSE_VERSION = "1.0";
            const accepted = localStorage.getItem("cc_license_accepted") === "1";
            const acceptedVersion = localStorage.getItem("cc_license_version") || "";
            const statusEl = document.getElementById("licenseStatus");

            if (!statusEl) {
                return;
            }

            if (accepted && acceptedVersion === LICENSE_VERSION) {
                statusEl.textContent = "• Términos aceptados";
                statusEl.classList.add("is-accepted");
            } else {

                statusEl.classList.add("is-pending");
            }
        })();

    <script type="module">
        import { requireAuth } from "./js/auth/authGuard.js";
        await requireAuth({ returnTo: window.location.pathname });

    <script>
        const DEFAULT_MEMBERSHIP_REQUIRED = 2026;
        const RUTINAS_MENU = [
            { id: "fuera-de-este-mundo", order: 1, title: "Fuera de Este Mundo", href: "rutinas/fueraDeEsteMundo.html", membership_required: 2026 },
            { id: "pegriloso", order: 2, title: "Un Juego \"Pegriloso\"", href: "rutinas/pegriloso.html", membership_required: 2026 },
            { id: "elefante", order: 3, title: "Memoria de Elefante", href: "rutinas/elefantes.html", membership_required: 2026 },
            { id: "momias", order: 4, title: "Momias de Camer", href: "rutinas/momias.html", membership_required: 2026 },
            { id: "the-boss", order: 5, title: "The Boss", href: "rutinas/theboss.html", membership_required: 2026 },
            { id: "prueba-de-fuego", order: 6, title: "Prueba de Fuego", href: "rutinas/pruebaDeFuego.html", membership_required: 2026 },
            { id: "imposible-de-ver", order: 7, title: "Imposible de ver", href: "rutinas/dadaSimple.html", membership_required: 2026 },
            { id: "oraculo-dorado", order: 8, title: "El Oráculo Dorado", href: "rutinas/oraculo.html", membership_required: 2026 },
            { id: "mano-del-destino", order: 9, title: "La Mano del Destino", href: "rutinas/manoPoker.html", membership_required: 2026 },
            { id: "hearts-and-crafts", order: 10, title: "Hearts & Crafts", href: "rutinas/dadaSimple.html", membership_required: 2026 },
            { id: "truco-carrera-corazon", order: 11, title: "Truco, Carrera y Corazón", href: "rutinas/dadaSimple.html", membership_required: 2026 },
            { id: "ojos-vendados", order: 12, title: "Con Los Ojos Vendados", href: "rutinas/ojosVendados.html", membership_required: 2026 },
            { id: "sospechoso", order: 13, title: "El Sospechoso de Siempre", href: "rutinas/dadaSimple.html", membership_required: 2026 },
            { id: "coleccionista", order: 14, title: "El Coleccionista", href: "rutinas/coleccionista.html", membership_required: 2026 },
            { id: "dado-r", order: 15, title: "Dado \"R\"", href: "rutinas/dadoR.html", membership_required: 2026 },
            { id: "rapido-numeroso", order: 16, title: "Rápido y Numeroso", href: "rutinas/rapidoNumeroso.html", membership_required: 2026 },
            { id: "voluntad-prestada", order: 17, title: "Voluntad Prestada", href: "rutinas/voluntadPrestada.html", membership_required: 2026 },
            { id: "teg-magico", order: 18, title: "TEG Mágico", href: "rutinas/tegMagico.html", membership_required: 2026 },
            { id: "me-viste-la-cara", order: 19, title: "Me viste la Cara", href: "rutinas/voluntadPrestada.html", membership_required: 2026 },
            { id: "inmodestia", order: 20, title: "Perdonen mi Inmodestia", href: "rutinas/perdonenMiInmodestia.html", membership_required: 2026 },
            { id: "lectura-simple-continua", order: 25, title: "Lectura Simple - Continua", href: "rutinas/dadaSimple.html", membership_required: 2026 },
            { id: "lectura-q", order: 26, title: "LecturaQ", href: "rutinas/lecturaQ.html", membership_required: 2026 },
            { id: "book-test-imposible", order: 27, title: "Book Test Imposible", href: "rutinas/bookTestImposible.html", membership_required: 2027 },
            { id: "control-frecuencia", order: 50, title: "Control de frecuencia", href: "rutinas/controlFrecuencia.html", membership_required: 2027 },
        ].map((rutina) => ({
            ...rutina,
            membership_required: rutina.membership_required ?? DEFAULT_MEMBERSHIP_REQUIRED,
        }));

        function getMembershipApi() {
            if (window.CC_Membership) return window.CC_Membership;

            const fallbackApi = {
                async ensureMembershipMax() {
                    return this.getMax();
                },
                getMax() {
                    const value = Number(localStorage.getItem("cc_membership_max"));
                    return Number.isFinite(value) ? value : DEFAULT_MEMBERSHIP_REQUIRED;
                },
                canAccess(required) {
                    return this.getMax() >= required;
                },
            };

            window.CC_Membership = fallbackApi;
            return fallbackApi;
        }

        function normalizeMembershipYear(value) {
            if (typeof value === "number" && Number.isFinite(value)) return value;
            if (typeof value === "string") {
                const parsed = Number(value);
                if (Number.isFinite(parsed)) return parsed;
            }
            if (value && typeof value === "object") {
                const candidates = [
                    value.max,
                    value.membership_max,
                    value.membership,
                    value.year,
                    value.level,
                ];
                for (const candidate of candidates) {
                    const parsed = Number(candidate);
                    if (Number.isFinite(parsed)) return parsed;
                }
            }
            return DEFAULT_MEMBERSHIP_REQUIRED;
        }

        async function resolveAccess({ membershipApi, required, max }) {
            try {
                const result = await membershipApi.canAccess(required);
                if (typeof result === "boolean") {
                    if (!result && normalizeMembershipYear(max) >= required) {
                        console.warn("[Membership] canAccess devolvió false con max suficiente. Se aplica fallback por max.");
                        return true;
                    }
                    return result;
                }
            } catch (error) {
                console.warn("[Membership] canAccess falló, aplicando fallback por max:", error);
            }
            return normalizeMembershipYear(max) >= required;
        }

        async function renderRutinasMenu() {
            const CC_Membership = getMembershipApi();
            await CC_Membership.ensureMembershipMax();
            const maxRaw = CC_Membership.getMax();
            const max = normalizeMembershipYear(maxRaw);
            console.log("Membership max:", max);

            const rutinasContainer = document.getElementById("rutinasContainer");
            if (!rutinasContainer) return;

            rutinasContainer.innerHTML = "";

            for (const rutina of RUTINAS_MENU) {
                const required = rutina.membership_required ?? DEFAULT_MEMBERSHIP_REQUIRED;
                const enabled = await resolveAccess({ membershipApi: CC_Membership, required, max });

                const card = document.createElement("div");
                card.className = "rutina-card";
                card.dataset.membershipRequired = String(required);

                const button = document.createElement("button");
                button.type = "button";
                button.textContent = `${rutina.order}. ${rutina.title}`;

                if (!enabled) {
                    card.classList.add("locked");
                    button.classList.add("locked");
                    button.title = `Requiere membresía ${required}`;
                    button.setAttribute("aria-label", `${rutina.title}. Requiere membresía ${required}`);

                    const requiredText = document.createElement("span");
                    requiredText.className = "required-membership-text";
                    requiredText.textContent = `Requiere membresía ${required}`;

                    const badge = document.createElement("span");
                    badge.className = "badge-locked";
                    badge.textContent = `🔒 ${required}`;

                    button.appendChild(badge);
                    button.addEventListener("click", (ev) => {
                        ev.preventDefault();
                        alert(`Rutina bloqueada. Requiere membresía ${required}.`);
                    });

                    card.appendChild(button);
                    card.appendChild(requiredText);
                } else {
                    button.addEventListener("click", () => {
                        location.href = rutina.href;
                    });
                    card.appendChild(button);
                }

                rutinasContainer.appendChild(card);
            }
        }

        renderRutinasMenu();
    </script>
</body>
