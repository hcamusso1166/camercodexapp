<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camer Codex® | Acceso</title>
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <link rel="stylesheet" href="/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      justify-content: center;
      padding: 24px 16px 40px;
    }

    .login-shell {
      width: min(420px, 100%);
      box-sizing: border-box;
      background: #0c0c0c;
      border: 1px solid rgba(243, 177, 63, 0.25);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .login-title {
      font-family: Georgia, serif;
      font-size: 1.8rem;
      color: #f3b13f;
      margin: 0 0 8px;
    }

    .login-subtitle {
      margin: 0 0 24px;
      color: #c9c9c9;
      font-size: 0.95rem;
    }

    .login-form {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .login-field label {
      display: block;
      text-align: left;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: #d4d4d4;
    }

    .login-field input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(243, 177, 63, 0.3);
      background-color: #151528;
      color: #f0f0f0;
      font-size: 0.95rem;
    }

    .login-field input:focus {
      outline: 2px solid rgba(243, 177, 63, 0.55);
      border-color: transparent;
    }

    .is-hidden {
      display: none;
    }

    .login-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .login-btn {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: #f3b13f;
      color: #1a1a1a;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .login-btn:hover {
      background-color: #d99c36;
      transform: translateY(-1px);
    }

    .login-btn.secondary {
      background: #111222;
      color: #f3b13f;
      border: 1px solid rgba(243, 177, 63, 0.4);
    }

    .login-btn.secondary:hover {
      background: rgba(243, 177, 63, 0.12);
    }


    .login-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.85rem;
      color: #f3b13f;
      text-decoration: none;
    }

    .login-link:hover {
      text-decoration: underline;
    }

.login-signup {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #d4d4d4;
      text-align: center;
    }

    .login-signup button {
      margin-left: 6px;
      padding: 0;
      border: none;
      background: transparent;
      color: #f3b13f;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }

    #msg {
      min-height: 20px;
      margin: 12px 0 0;
      font-size: 0.9rem;
      color: #f3b13f;
    }

    .login-footer {
      margin-top: 18px;
      font-size: 0.8rem;
      color: #8d8d8d;
    }
  </style>
  <script>
    (function () {
      const LICENSE_VERSION = "1.0";
      const accepted = localStorage.getItem("cc_license_accepted") === "1";
      const acceptedVersion = localStorage.getItem("cc_license_version") || "";

      if (!accepted || acceptedVersion !== LICENSE_VERSION) {
        const params = new URLSearchParams(location.search);
        const returnTo = params.get("returnTo") || "/";
        localStorage.setItem("cc_license_return_to", returnTo);
        location.replace("/legal/licencia.html");
      }
    })();
  </script>
</head>
<body>
<header>Camer Codex <sup>&reg;</sup></header>

  <main class="login-shell" aria-labelledby="login-title">
    <h1 class="login-title" id="login-title">Acceso</h1>
    <p class="login-subtitle">Ingresá con tu cuenta para desbloquear el arsenal secreto.</p>
<div class="login-form">
      <div class="login-field is-hidden" id="serial-field">
    <input id="serialNumber" type="text" placeholder="AA:BB:CC:DD:EE:FF" autocomplete="off" spellcheck="false" />
  </div>
</div>

    <div class="login-actions">
      <button class="login-btn secondary" id="btnGoogle" type="button">Continuar con Google</button>
    </div>
    <div> ---------------</div>

<div class="login-form">

  <div class="login-field">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="tu@email.com" autocomplete="email" />
  </div>
  <div class="login-field is-hidden" id="password-field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Tu clave" autocomplete="current-password" />
      </div>
      <div class="login-field is-hidden" id="confirm-password-field">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input id="confirmPassword" type="password" placeholder="Repetí tu clave" autocomplete="new-password" />
      </div>
    </div>
    <div class="login-actions "></div>
      <button class="login-btn secondary" id="btnLogin">Continuar con Email</button>
      <button class="login-btn is-hidden" id="btnValidateSerial" type="button">Validar Serial Number</button>
    </div>
    <p id="msg" role="status" aria-live="polite"></p>

       <a class="login-link" href="/js/auth/reset.html">¿Olvidaste tu contraseña?</a>

    <p class="login-signup">¿No tenés una cuenta?<button id="btnSignup" type="button">Crear cuenta</button></p>


    <div class="login-footer">Tecnología Secreta para Ilusionistas.</div>
  </main>
  <script type="module">
    import { supabase } from "/js/auth/supabaseClient.js";

    const $ = (id) => document.getElementById(id);
    const msg = (t) => ($("msg").textContent = t || "");

    const params = new URLSearchParams(location.search);
    const returnTo = params.get("returnTo") || "/";
    const passwordField = $("password-field");
    const passwordInput = $("password");
    const serialField = $("serial-field");
    const serialInput = $("serialNumber");
    const validateSerialButton = $("btnValidateSerial");
    const confirmPasswordField = $("confirm-password-field");
    const confirmPasswordInput = $("confirmPassword");
    const subtitle = document.querySelector(".login-subtitle");
    const forgotPasswordLink = document.querySelector(".login-link");
    const loginButton = $("btnLogin");
    const googleButton = $("btnGoogle");
    const emailField = $("email").closest(".login-field");
    const signupButton = $("btnSignup");
    let isSignupMode = false;
    let emailLoginStep = false;
let serialValidated = false;
    let validatedSerial = "";

    const SERIAL_REGEX = /^[0-9A-F]{2}(:[0-9A-F]{2}){5}$/;
    const PENDING_SERIAL_KEY = "cc_signup_pending_serial";
    const PENDING_EMAIL_KEY = "cc_signup_pending_email";

    const normalizeSerial = (value) =>
      (value || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "")
        .replace(/-/g, ":");

    const formatSerialFromRaw = (value) => {
      const cleanHex = (value || "")
        .toUpperCase()
        .replace(/[^0-9A-F]/g, "")
        .slice(0, 12);

      const parts = cleanHex.match(/.{1,2}/g) || [];
      const masked = parts.join(":");
      const needsTrailingColon = cleanHex.length > 0 && cleanHex.length % 2 === 0 && cleanHex.length < 12;

      return needsTrailingColon ? `${masked}:` : masked;
    };

    const getMaskedCursorPosition = (hexCount) => {
      if (hexCount <= 0) return 0;
      const safeCount = Math.min(hexCount, 12);
      return safeCount + Math.floor(safeCount / 2);
    };

    const getPendingSignup = () => {
      const pendingSerial = localStorage.getItem(PENDING_SERIAL_KEY) || "";
      const pendingEmail = localStorage.getItem(PENDING_EMAIL_KEY) || "";
      return { pendingSerial, pendingEmail };
    };

    const clearPendingSignup = () => {
      localStorage.removeItem(PENDING_SERIAL_KEY);
      localStorage.removeItem(PENDING_EMAIL_KEY);
    };

    const storePendingSignup = ({ serial, email = "" }) => {
      localStorage.setItem(PENDING_SERIAL_KEY, serial);
      localStorage.setItem(PENDING_EMAIL_KEY, email.toLowerCase());
    };

    const assignDeviceToCurrentUser = async (serialToAssign) => {
      const serial = normalizeSerial(serialToAssign);
      const { error } = await supabase.rpc("assign_mrcamerdev_device", {
        p_serial_number: serial,
      });

      if (error) {
        msg("No se pudo asignar el dispositivo. Escribinos a Mister Camer: hcamusso@gmail.com.");
        return false;
      }

      clearPendingSignup();
      return true;
    };

    const validateSerialAvailability = async () => {
      const serial = normalizeSerial(serialInput.value);
      serialInput.value = serial;

      if (!SERIAL_REGEX.test(serial)) {
        msg("Formato inválido. Usá AA:BB:CC:DD:EE:FF.");
        return false;
      }

      msg("Validando serial...");
      const { data, error } = await supabase.rpc("validate_mrcamerdev_serial_for_signup", {
        p_serial_number: serial,
      });

      if (error) {
        msg("No pudimos validar el serial. Contactá a Mister Camer: hcamusso@gmail.com.");
        return false;
      }

      const validationResult = Array.isArray(data) ? data[0] : data;

      if (!validationResult?.is_valid) {
        msg("El dispositivo no existe o ya está asignado. Contactá a Mister Camer: hcamusso@gmail.com.");
        return false;
      }

      serialValidated = true;
      validatedSerial = normalizeSerial(validationResult.normalized_serial || serial);
      storePendingSignup({ serial: validatedSerial });
      setModeUI();
      msg("Serial validado. Ahora completá tu registro con Email o Google.");
      $("email").focus();
      return true;
    };

    const tryAssignPendingDevice = async (session) => {
      const user = session?.user;
      if (!user?.email) return;

      const { pendingSerial, pendingEmail } = getPendingSignup();
      if (!pendingSerial) return;

      if (pendingEmail && pendingEmail !== user.email.toLowerCase()) return;

      await assignDeviceToCurrentUser(pendingSerial);
    };
    const togglePasswordFields = (showPassword, showConfirm) => {
      passwordField.classList.toggle("is-hidden", !showPassword);
      confirmPasswordField.classList.toggle("is-hidden", !showConfirm);
      if (!showPassword) passwordInput.value = "";
      if (!showConfirm) confirmPasswordInput.value = "";
    };

    const setModeUI = () => {
      if (isSignupMode) {
        subtitle.textContent = serialValidated
          ? "Serial validado. Completá tu registro con Email o Google."
          : "Validá el Serial Number de tu MrCamerDev1.0 ®.";
        forgotPasswordLink.classList.add("is-hidden");
        serialField.classList.remove("is-hidden");
        validateSerialButton.classList.toggle("is-hidden", serialValidated);
        emailField.classList.toggle("is-hidden", !serialValidated);
        passwordField.classList.toggle("is-hidden", !serialValidated);
        confirmPasswordField.classList.toggle("is-hidden", !serialValidated);
        loginButton.classList.toggle("is-hidden", !serialValidated);
        googleButton.classList.toggle("is-hidden", !serialValidated);
        googleButton.textContent = "Crear Cuenta con Google";
        loginButton.textContent = "Crear Cuenta con tu Email";
        signupButton.textContent = "Volver al acceso";
        return;
      }

      subtitle.textContent = "Ingresá con tu cuenta para desbloquear el arsenal secreto.";
      forgotPasswordLink.classList.remove("is-hidden");
      serialField.classList.add("is-hidden");
      validateSerialButton.classList.add("is-hidden");
      emailField.classList.remove("is-hidden");
      loginButton.classList.remove("is-hidden");
      googleButton.classList.remove("is-hidden");
      confirmPasswordField.classList.add("is-hidden");
      signupButton.textContent = "Crear cuenta";
      googleButton.textContent = "Continuar con Google";
      loginButton.textContent = "Continuar con Email";

    };


    const { data: sessionData } = await supabase.auth.getSession();
    if (sessionData?.session?.user) {
      await tryAssignPendingDevice(sessionData.session);
      location.replace(returnTo);
    }

    togglePasswordFields(false, false);
    setModeUI();

    $("btnLogin").onclick = async () => {
      const email = $("email").value.trim();
      const password = $("password").value;


      if (!isSignupMode) {
        if (!$("email").checkValidity()) {
          return msg("Ingresá un email válido.");
        }

        if (!emailLoginStep) {
          emailLoginStep = true;
          setModeUI();
          togglePasswordFields(true, false);
          msg("Ingresá tu contraseña para continuar.");
          passwordInput.focus();
          return;
        }

        msg("Ingresando...");
        if (!password) {
          return msg("Ingresá tu contraseña.");
        }

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) return msg("Error: " + error.message);
        const { data: postLoginSession } = await supabase.auth.getSession();
        await tryAssignPendingDevice(postLoginSession?.session);
        location.replace(returnTo);
        return;
      }

      msg("Creando cuenta...");
      const confirmPassword = confirmPasswordInput.value;

      if (!$("email").checkValidity()) {
        return msg("Ingresá un email válido.");
      }
      if (password.length < 8) {
        return msg("La contraseña debe tener al menos 8 caracteres.");
      }
      if (password !== confirmPassword) {
        return msg("La confirmación no coincide.");
      }
      if (!serialValidated || !validatedSerial) {
        return msg("Primero validá el Serial Number del dispositivo.");
      }
// 1) Armamos un callback SIEMPRE al mismo origen donde el usuario está (pre o prod)
    const emailRedirectTo = new URL("/js/auth/login.html", location.origin);
    emailRedirectTo.searchParams.set("returnTo", returnTo);

// 2) Pasamos el redirect a Supabase para que el email confirme y vuelva acá
    const { error } = await supabase.auth.signUp({
      email,
      password,
      options: { emailRedirectTo: emailRedirectTo.toString() },
    });
      if (error) {
        const errorMessage = (error.message || "").toLowerCase();
        if (errorMessage.includes("email rate limit exceeded")) {
          storePendingSignup({ serial: validatedSerial, email });
          return msg("Superaste el límite de correos de confirmación. Esperá unos minutos e intentá de nuevo, o usá \"Olvidé mi contraseña\" si ya tenías cuenta.");
        }
        return msg("Error: " + error.message);
      }

      storePendingSignup({ serial: validatedSerial, email });
      msg("Confirmá tu email mediante el correo que te llegue de Camer Codex ®");
      const { data } = await supabase.auth.getSession();
if (data?.session?.user) {
        await assignDeviceToCurrentUser(validatedSerial);
        location.replace(returnTo);
      }
    };

    $("btnSignup").onclick = async () => {
      if (!isSignupMode) {
        isSignupMode = true;
        emailLoginStep = false;
        serialValidated = false;
        validatedSerial = "";
        $("email").value = "";
        passwordInput.value = "";
        confirmPasswordInput.value = "";
        setModeUI();
        msg("Ingresá y validá el serial para continuar con la creación de cuenta.");
        serialInput.focus();
        return;
      }

      isSignupMode = false;
      emailLoginStep = false;
      serialValidated = false;
      validatedSerial = "";
      serialInput.value = "";
      passwordInput.value = "";
      confirmPasswordInput.value = "";
      setModeUI();
      togglePasswordFields(false, false);
      msg("Modo acceso activado.");
    };

    validateSerialButton.onclick = async () => {
      await validateSerialAvailability();
    };

    $("btnGoogle").onclick = async () => {
      if (isSignupMode && (!serialValidated || !validatedSerial)) {
        return msg("Primero validá el Serial Number del dispositivo.");
      }

      if (isSignupMode) {
        storePendingSignup({ serial: validatedSerial });
      }

      msg("Redirigiendo a Google...");
      const redirectTo = new URL("/js/auth/login.html", location.origin);
      redirectTo.searchParams.set("returnTo", returnTo);

      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: redirectTo.toString() },
      });
      if (error) msg("Error: " + error.message);
    };
    serialInput.addEventListener("input", (event) => {
      const target = event.target;
      const cursor = target.selectionStart ?? target.value.length;
      const hexBeforeCursor = (target.value.slice(0, cursor).match(/[0-9A-F]/gi) || []).length;

      const maskedValue = formatSerialFromRaw(target.value);
      target.value = maskedValue;

      const nextCursor = Math.min(getMaskedCursorPosition(hexBeforeCursor), maskedValue.length);
      target.setSelectionRange(nextCursor, nextCursor);
    });

    serialInput.addEventListener("blur", () => {
      serialInput.value = formatSerialFromRaw(normalizeSerial(serialInput.value));
    });
  </script>
</body>
</html>
