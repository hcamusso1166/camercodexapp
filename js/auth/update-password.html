<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camer Codex® | Actualizar contraseña</title>
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <link rel="stylesheet" href="/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      justify-content: center;
      padding: 24px 16px 40px;
    }

    .update-shell {
      width: min(420px, 100%);
      background: #0c0c0c;
      border: 1px solid rgba(243, 177, 63, 0.25);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .update-shell,
    .update-shell * {
      box-sizing: border-box;
    }

    .update-title {
      font-family: Georgia, serif;
      font-size: 1.7rem;
      color: #f3b13f;
      margin: 0 0 8px;
    }

    .update-subtitle {
      margin: 0 0 20px;
      color: #c9c9c9;
      font-size: 0.95rem;
    }

    .update-form {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .update-field label {
      display: block;
      text-align: left;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: #d4d4d4;
    }

    .update-field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(243, 177, 63, 0.3);
      background-color: #151528;
      color: #f0f0f0;
      font-size: 0.95rem;
    }

    .update-field input:focus {
      outline: 2px solid rgba(243, 177, 63, 0.55);
      border-color: transparent;
    }

    .password-input-wrap {
      position: relative;
    }

    .password-input-wrap input {
      padding-right: 48px;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #f3b13f;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }

    .password-toggle:hover {
      background: rgba(243, 177, 63, 0.12);
    }

    .password-toggle:focus-visible {
      outline: 2px solid rgba(243, 177, 63, 0.55);
      outline-offset: 1px;
    }

    .password-toggle svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .update-actions {
      display: grid;
      gap: 10px;
    }

    .update-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: #f3b13f;
      color: #1a1a1a;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .update-btn:hover {
      background-color: #d99c36;
      transform: translateY(-1px);
    }

    .update-btn.secondary {
      background: #111222;
      color: #f3b13f;
      border: 1px solid rgba(243, 177, 63, 0.4);
    }

    .update-btn.secondary:hover {
      background: rgba(243, 177, 63, 0.12);
    }

    #msg {
      min-height: 20px;
      margin: 12px 0 0;
      font-size: 0.9rem;
      color: #f3b13f;
    }
  </style>
</head>
<body>
<header>Camer Codex <sup>&reg;</sup></header>

  <main class="update-shell" aria-labelledby="update-title">
    <h1 class="update-title" id="update-title">Actualizar contraseña</h1>
    <p class="update-subtitle">Ingresá tu nueva contraseña para recuperar el acceso.</p>

    <div class="update-form">
      <div class="update-field">
        <label for="password">Nueva contraseña</label>
        <div class="password-input-wrap">
          <input id="password" type="password" placeholder="Nueva clave" autocomplete="new-password" />
          <button
            type="button"
            class="password-toggle"
            data-target="password"
            aria-label="Mostrar contraseña"
            aria-pressed="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
              <circle cx="12" cy="12" r="3" />
              <path d="M4 4l16 16" class="eye-slash" />
            </svg>
          </button>
        </div>
      </div>
      <div class="update-field">
        <label for="confirmPassword">Confirmar contraseña</label>
        <div class="password-input-wrap">
          <input id="confirmPassword" type="password" placeholder="Repetí la clave" autocomplete="new-password" />
          <button
            type="button"
            class="password-toggle"
            data-target="confirmPassword"
            aria-label="Mostrar contraseña"
            aria-pressed="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
              <circle cx="12" cy="12" r="3" />
              <path d="M4 4l16 16" class="eye-slash" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="update-actions">
      <button class="update-btn" id="btnUpdate">Actualizar contraseña</button>
      <a class="update-btn secondary" href="/js/auth/login.html">Volver al acceso</a>
    </div>

    <p id="msg" role="status" aria-live="polite"></p>
  </main>

  <script type="module">
    import { supabase } from "/js/auth/supabaseClient.js";

    const $ = (id) => document.getElementById(id);
    const msg = (t) => ($("msg").textContent = t || "");
    const passwordToggles = document.querySelectorAll(".password-toggle");

    const updatePasswordToggleIcons = () => {
      passwordToggles.forEach((toggle) => {
        const input = $(toggle.dataset.target);
        const isVisible = input?.type === "text";
        toggle.setAttribute("aria-pressed", String(isVisible));
        toggle.setAttribute("aria-label", isVisible ? "Ocultar contraseña" : "Mostrar contraseña");
        const slash = toggle.querySelector(".eye-slash");
        if (slash) {
          slash.style.display = isVisible ? "none" : "block";
        }
      });
    };

    passwordToggles.forEach((toggle) => {
      toggle.addEventListener("click", () => {
        const input = $(toggle.dataset.target);
        if (!input) return;
        input.type = input.type === "password" ? "text" : "password";
        updatePasswordToggleIcons();
        input.focus();
      });
    });

    const setBusy = (busy) => {
      const isBusy = Boolean(busy);
      $("btnUpdate").disabled = isBusy;
      $("password").disabled = isBusy;
      $("confirmPassword").disabled = isBusy;
      if (isBusy) {
        $("password").type = "password";
        $("confirmPassword").type = "password";
      }
      updatePasswordToggleIcons();
      $("btnUpdate").textContent = isBusy ? "Actualizando..." : "Actualizar contraseña";
    };

    $("btnUpdate").onclick = async () => {
      setBusy(true);
      msg("Actualizando...");

      // Asegurar que exista sesión (por si el usuario recargó, etc.)
      const boot = await bootstrapRecoverySession();
      if (!boot.ok) {
        setBusy(false);
        msg("No encontramos una sesión de recuperación válida. Volvé a solicitar el link.");
        if (boot.reason !== "missing_tokens") {
          console.error(boot.error);
        }
        return;
      }

      const password = $("password").value;
      const confirmPassword = $("confirmPassword").value;

      if (password.length < 8) {
        setBusy(false);
        return msg("La contraseña debe tener al menos 8 caracteres.");
      }
      if (password !== confirmPassword) {
        setBusy(false);
        return msg("La confirmación no coincide.");
      }

      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        setBusy(false);
        return msg("Error: " + error.message);
      }

      msg("Contraseña actualizada. Ya podés ingresar.");
      // opcional: redirigir al login luego de 1.2s
      setTimeout(() => (window.location.href = "/js/auth/login.html"), 1200);
    };

    async function bootstrapRecoverySession() {
      // A) PKCE: ?code=...
      const code = new URLSearchParams(window.location.search).get("code");
      if (code) {
        const { data, error } = await supabase.auth.exchangeCodeForSession(code);
        if (error) return { ok: false, error };
        return { ok: true, session: data.session };
      }

      // B) Token hash (?token_hash=...&type=recovery), habitual en links de recuperación
      const search = new URLSearchParams(window.location.search);
      const token_hash = search.get("token_hash");
      const type = search.get("type") || "recovery";
      if (token_hash) {
        const { data, error } = await supabase.auth.verifyOtp({ type, token_hash });
        if (error) return { ok: false, error };
        return { ok: true, session: data.session };
      }

      // C) Implicit: #access_token=...&refresh_token=...
      const hash = window.location.hash?.startsWith("#") ? window.location.hash.slice(1) : "";
      const hp = new URLSearchParams(hash);
      const access_token = hp.get("access_token");
      const refresh_token = hp.get("refresh_token");

      if (access_token && refresh_token) {
        const { data, error } = await supabase.auth.setSession({ access_token, refresh_token });
        if (error) return { ok: false, error };
        return { ok: true, session: data.session };
      }

      // D) Si ya había sesión (raro pero posible)
      const { data } = await supabase.auth.getSession();
      if (data?.session) return { ok: true, session: data.session };

      return { ok: false, reason: "missing_tokens" };
    }

    // Bootstrap al cargar
    updatePasswordToggleIcons();
    (async () => {
      setBusy(true);
      msg("Validando enlace...");
      
      const boot = await bootstrapRecoverySession();
      if (!boot.ok) {
        setBusy(false);
        msg(
          boot.reason === "missing_tokens"
            ? "Abrí esta página desde el link de recuperación que recibiste por email."
            : "No pudimos validar el enlace de recuperación. Pedí uno nuevo e intentá otra vez."
        );
        if (boot.reason !== "missing_tokens") {
          console.error(boot.error);
        }
        return;
      }
      msg("Listo. Elegí tu nueva contraseña.");
      setBusy(false);
    })();
    
  </script>
</body>
</html>
