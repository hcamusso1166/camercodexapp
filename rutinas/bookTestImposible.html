<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Book Test Imposible - Camer Codex</title>
  <link rel="stylesheet" type="text/css" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<header id="headerRoutine">Camer Codex <sup>&reg;</sup>
  <div class="menu-icon">
    <img src="../icons/more_vert_16_D9D9D9.svg" alt="Menú" id="menuToggle">
    <div id="menuDropdown" class="menu-dropdown hidden">
      <a href="#" data-popup="ayuda">Ayuda</a>
      <a href="#" data-popup="acerca">Acerca de</a>
      <a href="#" data-popup="estadoBLE">Web Bluetooth</a>
    </div>
  </div>

  <div id="popupModal" class="popup-modal hidden">
    <div class="popup-content">
      <button id="popupCloseBtn">X</button>
      <div id="popupBody"></div>
    </div>
  </div>

  <div class="status-icons">
    <img id="estadoConexionBLE" src="../icons/bluetooth_disabled_16_D9D9D9.svg" alt="Conexión BLE" title="Conexión BLE">
    <img id="estadoBLEIcon" src="../icons/block_16_D9D9D9.svg" alt="Estado BLE" title="Estado BLE">
    <img id="batteryIcon" src="../icons/battery_unknown_16_D9D9D9.svg" alt="Estado batería" title="Batería desconocida">
  </div>
</header>

<div class="rutina">Book Test Imposible *</div>

<div class="content">
  <div class="card-grid single-column">

    <div class="card dark-card" id="accionMagoCard">
      <h2>Acción</h2>
      <p class="gray-label" id="accionMagoMensaje">Conectar el dispositivo BLE</p>
    </div>

    <div class="card dark-card" id="tituloCard">
      <h2>Título</h2>
      <div class="slot-header">
        <span>Título</span>
        <time class="slot-time" id="tituloTime"></time>
      </div>
      <div class="slot-body">
        <div class="slot-card" id="tituloValue">—</div>
      </div>
    </div>

    <div class="card dark-card" id="slotsCard">
      <h2>Slots</h2>
      <div id="slotsContainer" class="slots-container">
        <div class="slot" data-slot="1">
          <div class="slot-header">
            <span>Slot 1</span>
            <time class="slot-time" id="slotTime1"></time>
          </div>
          <div class="slot-body">
            <div class="slot-card" id="slotCard1">—</div>
          </div>
        </div>
        <div class="slot" data-slot="2">
          <div class="slot-header">
            <span>Slot 2</span>
            <time class="slot-time" id="slotTime2"></time>
          </div>
          <div class="slot-body">
            <div class="slot-card" id="slotCard2">—</div>
          </div>
        </div>
        <div class="slot" data-slot="3">
          <div class="slot-header">
            <span>Slot 3</span>
            <time class="slot-time" id="slotTime3"></time>
          </div>
          <div class="slot-body">
            <div class="slot-card" id="slotCard3">—</div>
          </div>
        </div>
        <div class="slot" data-slot="4">
          <div class="slot-header">
            <span>Slot 4</span>
            <time class="slot-time" id="slotTime4"></time>
          </div>
          <div class="slot-body">
            <div class="slot-card" id="slotCard4">—</div>
          </div>
        </div>
        <div class="slot" data-slot="5">
          <div class="slot-header">
            <span>Slot 5</span>
            <time class="slot-time" id="slotTime5"></time>
          </div>
          <div class="slot-body">
            <div class="slot-card" id="slotCard5">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card dark-card compacto">
      <h3>Dispositivo Bluetooth (BLE)</h3>
      <div class="button-row">
        <button id="connectBleButton" class="button-primary connectButton">
          <img src="../icons/bluetooth.svg" alt="Bluetooth Icon" id="icon-left">
          Conectar
        </button>
        <button id="disconnectBleButton" class="button-primary disconnectButton">
          <img src="../icons/bluetooth_disabled.svg" alt="Disconnect Bluetooth Icon" id="icon-left">
          Desconectar
        </button>
        <p class="gray-label">BLE state: <strong><span id="bleState" style="color:#d13a30;">Desconectado</span></strong></p>
      </div>
    </div>

    <div class="card dark-card">
      <button onclick="window.location.href='../index.html'" class="button-secondary">
        <img src="../icons/home_F3B13F.svg" alt="Home" id="icon-left">
        Volver al Menú
      </button>
    </div>
  </div>
</div>

<footer>v <span id="appVersion"></span></footer>

<audio id="tagAudio" src="" preload="auto"></audio>
<script src="../js/config.js"></script>
<script src="../js/main.js"></script>
<script src="../js/rutinas/bookTestImposible.js"></script>
</body>
</html>
